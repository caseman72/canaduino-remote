substitutions:
  pulse_duration: "720ms"

  # Secrets - override via upload.sh
  wifi_ssid: "PLACEHOLDER"
  wifi_password: "PLACEHOLDER"
  mqtt_broker: "PLACEHOLDER"
  mqtt_username: "PLACEHOLDER"
  mqtt_password: "PLACEHOLDER"
  ota_password: "PLACEHOLDER"

esphome:
  name: liftmaster-remote
  friendly_name: Liftmaster Remote

esp32:
  board: arduino_nano_esp32
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_LOG_COLORS: "n"

wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_password}
  reboot_timeout: 15min

mqtt:
  broker: ${mqtt_broker}
  port: 1883
  username: ${mqtt_username}
  password: ${mqtt_password}
  discovery: true
  discovery_prefix: homeassistant
  discovery_unique_id_generator: mac
  topic_prefix: liftmaster
  idf_send_async: true
  log_topic: null
  reboot_timeout: 15min
  on_connect:
    - logger.log: "MQTT Connected!"
  on_disconnect:
    - logger.log: "MQTT Disconnected!"

ota:
  platform: esphome
  password: ${ota_password}

logger:
  level: INFO

# 1-Wire bus for DS18B20 temperature sensor
# Wiring: SDA/A4 terminal (data), 5V (VCC), GND
# Canaduino SDA/A4 -> A4 on Nano ESP32 -> GPIO 11
# IMPORTANT: 4.7kΩ pull-up resistor required between Data and VCC
one_wire:
  - platform: gpio
    pin: 11  # Canaduino SDA/A4 = GPIO 11

# Relay outputs - internal (controlled by buttons)
# Arduino Nano ESP32: D2=GPIO5, D3=GPIO6, D4=GPIO7, D5=GPIO8, A3=GPIO4
switch:
  - platform: gpio
    pin: 4
    id: relay_shop1
    internal: true
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin: 5
    id: relay_shop2
    internal: true
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin: 6
    id: relay_shop3
    internal: true
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin: 7
    id: relay_shop4
    internal: true
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin: 8
    id: relay_barn
    internal: true
    restore_mode: ALWAYS_OFF

# MQTT buttons for Home Assistant
button:
  - platform: template
    name: "Shop Door 1"
    id: btn_shop1
    icon: "mdi:garage"
    on_press:
      - logger.log: "Shop Door 1 pressed"
      - switch.turn_on: relay_shop1
      - delay: ${pulse_duration}
      - switch.turn_off: relay_shop1

  - platform: template
    name: "Shop Door 2"
    id: btn_shop2
    icon: "mdi:garage"
    on_press:
      - logger.log: "Shop Door 2 pressed"
      - switch.turn_on: relay_shop2
      - delay: ${pulse_duration}
      - switch.turn_off: relay_shop2

  - platform: template
    name: "Shop Door 3"
    id: btn_shop3
    icon: "mdi:garage"
    on_press:
      - logger.log: "Shop Door 3 pressed"
      - switch.turn_on: relay_shop3
      - delay: ${pulse_duration}
      - switch.turn_off: relay_shop3

  - platform: template
    name: "Shop Door 4"
    id: btn_shop4
    icon: "mdi:garage"
    on_press:
      - logger.log: "Shop Door 4 pressed"
      - switch.turn_on: relay_shop4
      - delay: ${pulse_duration}
      - switch.turn_off: relay_shop4

  - platform: template
    name: "Barn Door"
    id: btn_barn
    icon: "mdi:barn"
    on_press:
      - logger.log: "Barn Door pressed"
      - switch.turn_on: relay_barn
      - delay: ${pulse_duration}
      - switch.turn_off: relay_barn

  - platform: template
    name: "P5 Button - Restart"
    id: btn_restart
    icon: "mdi:restart"
    on_press:
      - logger.log: "Restart requested via P5"
      - delay: 500ms
      - lambda: 'App.safe_reboot();'

# Diagnostics
sensor:
  - platform: wifi_signal
    name: "WiFi RSSI"
    id: wifi_rssi
    update_interval: 60s
    icon: "mdi:wifi"

  - platform: dallas_temp
    name: "Panel Temperature"
    id: panel_temp
    index: 0
    update_interval: 60s
    icon: "mdi:thermometer"
    filters:
      - lambda: return x * 9.0 / 5.0 + 32.0;
    unit_of_measurement: "°F"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: wifi_ip
      icon: "mdi:ip-network"

  - platform: wifi_info
    ssid:
      name: "WiFi Network"
      id: wifi_network
      icon: "mdi:wifi-cog"
