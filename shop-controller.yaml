substitutions:
  pulse_duration: "503ms"  # Oregon area code

  # Secrets - override via shop-upload.sh
  wifi_primary_ssid: "PLACEHOLDER"
  wifi_primary_password: "PLACEHOLDER"
  wifi_secondary_ssid: "PLACEHOLDER"
  wifi_secondary_password: "PLACEHOLDER"
  mqtt_broker: "PLACEHOLDER"
  mqtt_username: "PLACEHOLDER"
  mqtt_password: "PLACEHOLDER"
  ota_password: "PLACEHOLDER"

esphome:
  name: shop-controller
  friendly_name: Shop Controller
  on_boot:
    priority: 599
    then:
      - lambda: |-
          ESP_LOGW("boot", "use_secondary_network = %s", id(use_secondary_network) ? "TRUE" : "FALSE");
          if (id(use_secondary_network)) {
            ESP_LOGW("boot", "SWITCHING to secondary: ${wifi_secondary_ssid}");
            wifi::WiFiAP ap;
            ap.set_ssid("${wifi_secondary_ssid}");
            ap.set_password("${wifi_secondary_password}");
            wifi::global_wifi_component->set_sta(ap);
          } else {
            ESP_LOGW("boot", "Using primary: ${wifi_primary_ssid}");
          }

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_LOG_COLORS: "n"

wifi:
  ssid: ${wifi_primary_ssid}
  password: ${wifi_primary_password}
  fast_connect: true
  reboot_timeout: 15min

mqtt:
  broker: ${mqtt_broker}
  port: 8883
  username: ${mqtt_username}
  password: ${mqtt_password}
  discovery: true
  discovery_prefix: homeassistant
  discovery_unique_id_generator: mac
  topic_prefix: shop-controller
  idf_send_async: true
  log_topic: shop-controller/logs
  reboot_timeout: 15min
  on_connect:
    - logger.log: "MQTT Connected!"
  on_disconnect:
    - logger.log: "MQTT Disconnected!"
  on_json_message:
    - topic: zigbee/shop_1_sensor
      then:
        - lambda: |-
            if (x["contact"].is<bool>()) {
              id(shop_1_contact) = x["contact"].as<bool>();
            }
    - topic: zigbee/shop_2_sensor
      then:
        - lambda: |-
            if (x["contact"].is<bool>()) {
              id(shop_2_contact) = x["contact"].as<bool>();
            }
    - topic: zigbee/shop_3_sensor
      then:
        - lambda: |-
            if (x["contact"].is<bool>()) {
              id(shop_3_contact) = x["contact"].as<bool>();
            }
    - topic: zigbee/shop_4_sensor
      then:
        - lambda: |-
            if (x["contact"].is<bool>()) {
              id(shop_4_contact) = x["contact"].as<bool>();
            }
    - topic: zigbee/barn_sensor
      then:
        - lambda: |-
            if (x["contact"].is<bool>()) {
              id(barn_contact) = x["contact"].as<bool>();
            }
