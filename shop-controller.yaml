ota:
  platform: esphome
  password: ${ota_password}

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG

# State tracking
globals:
  - id: use_secondary_network
    type: bool
    restore_value: yes
    initial_value: 'false'

  # Zigbee tilt sensor contact state (true = closed, false = open)
  - id: shop_1_contact
    type: bool
    restore_value: no
    initial_value: 'true'

  - id: shop_2_contact
    type: bool
    restore_value: no
    initial_value: 'true'

  - id: shop_3_contact
    type: bool
    restore_value: no
    initial_value: 'true'

  - id: shop_4_contact
    type: bool
    restore_value: no
    initial_value: 'true'

  - id: barn_contact
    type: bool
    restore_value: no
    initial_value: 'true'

# 1-Wire bus for DS18B20 temperature sensor
# Wiring: GPIO6 (data), 3V3 (VCC), GND
# 4.7kΩ pull-up built into harness
one_wire:
  - platform: gpio
    pin: 6

# Relay outputs - internal (controlled by covers)
# ESP32-C6-DevKitC-1: GPIO0, GPIO1, GPIO10, GPIO4 (left side)
switch:
  - platform: gpio
    pin:
      number: 0
      inverted: true
    id: relay_shop_2
    internal: true
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin:
      number: 1
      inverted: true
    id: relay_shop_3
    internal: true
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin:
      number: 10
      inverted: true
    id: relay_shop_4
    internal: true
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin:
      number: 5
      inverted: true
    id: relay_barn
    internal: true
    restore_mode: ALWAYS_OFF

# Cover entities - state from Zigbee tilt sensors via Z2M MQTT
cover:
  - platform: template
    name: "Shop Door 1"
    id: cover_shop_1
    device_class: garage
    icon: "mdi:garage"
    lambda: 'return id(shop_1_contact) ? COVER_CLOSED : COVER_OPEN;'
    close_action:
      - logger.log: "Shop Door 1 close requested — forwarding to myq-mcp"
      - mqtt.publish:
          topic: myq/shop1/command
          payload: "close"

  - platform: template
    name: "Shop Door 2"
    id: cover_shop_2
    device_class: garage
    icon: "mdi:garage"
    lambda: 'return id(shop_2_contact) ? COVER_CLOSED : COVER_OPEN;'
    open_action:
      - logger.log: "Shop Door 2 open/toggle"
      - switch.turn_on: relay_shop_2
      - delay: ${pulse_duration}
      - switch.turn_off: relay_shop_2
    close_action:
      - logger.log: "Shop Door 2 close/toggle"
      - switch.turn_on: relay_shop_2
      - delay: ${pulse_duration}
      - switch.turn_off: relay_shop_2
    stop_action:
      - logger.log: "Shop Door 2 stop/toggle"
      - switch.turn_on: relay_shop_2
      - delay: ${pulse_duration}
      - switch.turn_off: relay_shop_2

  - platform: template
    name: "Shop Door 3"
    id: cover_shop_3
    device_class: garage
    icon: "mdi:garage"
    lambda: 'return id(shop_3_contact) ? COVER_CLOSED : COVER_OPEN;'
    open_action:
      - logger.log: "Shop Door 3 open/toggle"
      - switch.turn_on: relay_shop_3
      - delay: ${pulse_duration}
      - switch.turn_off: relay_shop_3
    close_action:
      - logger.log: "Shop Door 3 close/toggle"
      - switch.turn_on: relay_shop_3
      - delay: ${pulse_duration}
      - switch.turn_off: relay_shop_3
    stop_action:
      - logger.log: "Shop Door 3 stop/toggle"
      - switch.turn_on: relay_shop_3
      - delay: ${pulse_duration}
      - switch.turn_off: relay_shop_3

  - platform: template
    name: "Shop Door 4"
    id: cover_shop_4
    device_class: garage
    icon: "mdi:garage"
    lambda: 'return id(shop_4_contact) ? COVER_CLOSED : COVER_OPEN;'
    open_action:
      - logger.log: "Shop Door 4 open/toggle"
      - switch.turn_on: relay_shop_4
      - delay: ${pulse_duration}
      - switch.turn_off: relay_shop_4
    close_action:
      - logger.log: "Shop Door 4 close/toggle"
      - switch.turn_on: relay_shop_4
      - delay: ${pulse_duration}
      - switch.turn_off: relay_shop_4
    stop_action:
      - logger.log: "Shop Door 4 stop/toggle"
      - switch.turn_on: relay_shop_4
      - delay: ${pulse_duration}
      - switch.turn_off: relay_shop_4

  - platform: template
    name: "Barn Door"
    id: cover_barn
    device_class: garage
    icon: "mdi:barn"
    lambda: 'return id(barn_contact) ? COVER_CLOSED : COVER_OPEN;'
    open_action:
      - logger.log: "Barn Door open/toggle"
      - switch.turn_on: relay_barn
      - delay: ${pulse_duration}
      - switch.turn_off: relay_barn
    close_action:
      - logger.log: "Barn Door close/toggle"
      - switch.turn_on: relay_barn
      - delay: ${pulse_duration}
      - switch.turn_off: relay_barn
    stop_action:
      - logger.log: "Barn Door stop/toggle"
      - switch.turn_on: relay_barn
      - delay: ${pulse_duration}
      - switch.turn_off: relay_barn

# Utility buttons
button:
  - platform: template
    name: "Switch Network"
    id: btn_switch_network
    icon: "mdi:wifi-sync"
    on_press:
      - script.execute: switch_network

  - platform: template
    name: "Restart"
    id: btn_restart
    icon: "mdi:restart"
    on_press:
      - logger.log: "Restart requested"
      - delay: 500ms
      - lambda: 'App.safe_reboot();'

# Diagnostics
sensor:
  - platform: wifi_signal
    name: "WiFi RSSI"
    id: wifi_rssi
    update_interval: 60s
    icon: "mdi:wifi"

  - platform: dallas_temp
    name: "Panel Temperature"
    id: panel_temp
    index: 0
    update_interval: 60s
    icon: "mdi:thermometer"
    filters:
      - lambda: return x * 9.0 / 5.0 + 32.0;
    unit_of_measurement: "°F"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: wifi_ip
      icon: "mdi:ip-network"

  - platform: wifi_info
    ssid:
      name: "WiFi Network"
      id: wifi_network
      icon: "mdi:wifi-cog"

# Scripts
script:
  - id: switch_network
    then:
      - lambda: |-
          id(use_secondary_network) = !id(use_secondary_network);
          if (id(use_secondary_network)) {
            ESP_LOGI("wifi", "Switching to ${wifi_secondary_ssid} - will restart");
          } else {
            ESP_LOGI("wifi", "Switching to ${wifi_primary_ssid} - will restart");
          }
      - delay: 500ms
      - lambda: 'App.safe_reboot();'
